<!DOCTYPE html>
<html>

<head>
    <title>CYBER_PATH // PROTOCOL_17</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
         :root {
            --neon: #00f2ff;
            --dark: #00080d;
            --glass: rgba(0, 242, 255, 0.1);
            --red: #ff3344;
            --heal: #00ff88;
            --ammo: #ffcc00;
        }
        
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: var(--neon);
            touch-action: none;
            user-select: none;
        }
        
        #crt {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 50%, #000 150%);
            pointer-events: none;
            z-index: 1000;
            border: 12px solid #111;
            box-sizing: border-box;
        }
        /* HUD & STAGE INFO */
        
        #hud-top {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1100;
            border-left: 3px solid var(--neon);
            padding-left: 15px;
        }
        
        #stage-info {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 1100;
            text-align: right;
            letter-spacing: 2px;
        }
        
        #hud-center {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 40px;
            z-index: 1100;
        }
        
        .data-box {
            background: var(--glass);
            border: 1px solid var(--neon);
            padding: 10px 20px;
            text-align: center;
            min-width: 80px;
        }
        
        .data-box label {
            font-size: 0.6rem;
            display: block;
            margin-bottom: 5px;
            opacity: 0.7;
        }
        
        .data-box b {
            font-size: 1.4rem;
            text-shadow: 0 0 10px var(--neon);
        }
        
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 30px;
            transform: translate(-50%, -50%);
            border: 1px solid var(--neon);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2000;
            opacity: 0.6;
            transition: 0.1s;
        }
        
        .locked {
            border-color: var(--red) !important;
            box-shadow: 0 0 15px var(--red);
            opacity: 1 !important;
        }
        
        #weapon {
            width: 160px;
            height: 160px;
            background: rgba(0, 242, 255, 0.05);
            border: 2px solid var(--neon);
            border-bottom: none;
            clip-path: polygon(20% 0, 80% 0, 100% 100%, 0 100%);
            position: relative;
        }
        
        .fire-anim {
            transform: translateY(20px) scaleX(1.3);
            filter: brightness(2);
        }
        /* TACTICAL MOBILE CONTROLS */
        
        #controls {
            position: fixed;
            bottom: 40px;
            left: 40px;
            display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(2, 80px);
            gap: 15px;
            z-index: 2000;
        }
        
        .btn {
            background: var(--glass);
            border: 2px solid var(--neon);
            color: var(--neon);
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            clip-path: polygon(15% 0, 85% 0, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0 85%, 0 15%);
            transition: 0.1s;
        }
        
        .btn:active {
            background: var(--neon);
            color: #000;
            transform: scale(0.9);
        }
        
        #btn-f {
            grid-column: 2;
            grid-row: 1;
        }
        
        #btn-l {
            grid-column: 1;
            grid-row: 2;
        }
        
        #btn-b {
            grid-column: 2;
            grid-row: 2;
        }
        
        #btn-r {
            grid-column: 3;
            grid-row: 2;
        }
        
        #btn-shoot {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 130px;
            height: 130px;
            background: rgba(255, 51, 68, 0.1);
            border: 4px double var(--red);
            color: var(--red);
            border-radius: 50%;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            z-index: 2000;
            box-shadow: 0 0 20px rgba(255, 51, 68, 0.2);
        }
        
        #btn-shoot:active {
            background: var(--red);
            color: #fff;
            transform: scale(0.95);
        }
        
        #hp-container {
            width: 250px;
            height: 6px;
            background: #001a22;
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 3px;
            overflow: hidden;
        }
        
        #hp-bar {
            height: 100%;
            background: var(--neon);
            box-shadow: 0 0 10px var(--neon);
            transition: 0.5s;
            width: 100%;
        }
        
        #death-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--red);
            border: 20px solid var(--red);
            box-sizing: border-box;
        }
        
        canvas#game {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
    </style>
</head>

<body>
    <div id="crt"></div>
    <div id="crosshair"></div>
    <div id="hud-top">CYBER_PATH_v1.7<span>MOBILE_INTERFACE_SYNC</span></div>
    <div id="stage-info">SECTOR: <b id="lvl-count">01</b></div>

    <div id="hud-center">
        <div class="data-box"><label>CELLS</label><b id="a">100</b></div>
        <div id="weapon"></div>
        <div class="data-box"><label>DELETED</label><b id="k">0</b></div>
    </div>

    <div id="hp-container">
        <div id="hp-bar"></div>
    </div>

    <div id="controls">
        <button class="btn" id="btn-f">FWD</button>
        <button class="btn" id="btn-l">ROT_L</button>
        <button class="btn" id="btn-b">BACK</button>
        <button class="btn" id="btn-r">ROT_R</button>
    </div>
    <button id="btn-shoot">FIRE</button>

    <div id="death-screen">
        <h1>SIGNAL LOST</h1>
        <button onclick="location.reload()" style="background:var(--red); color:#000; border:none; padding:15px 40px; font-weight:bold; cursor:pointer">REBOOT</button>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game"),
            ctx = canvas.getContext("2d");
        let ammo = 100,
            kills = 0,
            hp = 100,
            active = true,
            shake = 0,
            lastFire = 0,
            stage = 1;
        let map = [],
            p = {
                x: 15,
                y: 10,
                dir: 0
            },
            enemies = [],
            pickups = [];
        const keys = {};

        function bind(id, k) {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => {
                e.preventDefault();
                keys[k] = true;
            };
            el.onpointerup = el.onpointerleave = () => keys[k] = false;
        }
        bind('btn-l', 'left');
        bind('btn-r', 'right');
        bind('btn-f', 'up');
        bind('btn-b', 'down');
        bind('btn-shoot', 'fire');
        window.onkeydown = e => keys[e.key.toLowerCase()] = true;
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;

        function generateSector() {
            map = Array(20).fill().map(() => Array(30).fill(1));
            let x = 15,
                y = 10;
            p.x = x + 0.5;
            p.y = y + 0.5;
            for (let i = 0; i < 400; i++) {
                let d = Math.floor(Math.random() * 4);
                if (d == 0 && y > 2) y--;
                else if (d == 1 && y < 17) y++;
                else if (d == 2 && x > 2) x--;
                else if (d == 3 && x < 27) x++;
                for (let oy = -1; oy <= 1; oy++)
                    for (let ox = -1; ox <= 1; ox++) map[y + oy][x + ox] = 0;
            }
            enemies = Array(10 + stage).fill(0).map(() => {
                let ex, ey;
                do {
                    ex = Math.floor(Math.random() * 30);
                    ey = Math.floor(Math.random() * 20);
                } while (map[ey][ex] != 0);
                return {
                    x: ex + 0.5,
                    y: ey + 0.5,
                    alive: true
                };
            });
            pickups = Array(6).fill(0).map(() => {
                let px, py;
                do {
                    px = Math.floor(Math.random() * 30);
                    py = Math.floor(Math.random() * 20);
                } while (map[py][px] != 0);
                return {
                    x: px + 0.5,
                    y: py + 0.5,
                    type: Math.random() > 0.5 ? 'health' : 'ammo',
                    active: true
                };
            });
        }

        function shoot() {
            let now = Date.now();
            if (!active || ammo <= 0 || now - lastFire < 180) return;
            lastFire = now;
            ammo--;
            shake = 20;
            document.getElementById('a').innerText = ammo;
            document.getElementById('weapon').classList.add('fire-anim');
            enemies.forEach(en => {
                if (!en.alive) return;
                let a = Math.atan2(en.y - p.y, en.x - p.x) - p.dir;
                while (a < -Math.PI) a += Math.PI * 2;
                while (a > Math.PI) a -= Math.PI * 2;
                if (Math.abs(a) < 0.08 && Math.sqrt((en.x - p.x) ** 2 + (en.y - p.y) ** 2) < 15) {
                    en.alive = false;
                    kills++;
                    document.getElementById('k').innerText = kills;
                    if (enemies.every(e => !e.alive)) {
                        stage++;
                        generateSector();
                        document.getElementById('lvl-count').innerText = stage.toString().padStart(2, '0');
                    }
                }
            });
            setTimeout(() => document.getElementById('weapon').classList.remove('fire-anim'), 100);
        }

        function update() {
            if (!active) return;
            if (keys['left'] || keys['a']) p.dir -= 0.035;
            if (keys['right'] || keys['d']) p.dir += 0.035;
            if (keys['up'] || keys['w']) {
                let nx = p.x + Math.cos(p.dir) * 0.1,
                    ny = p.y + Math.sin(p.dir) * 0.1;
                if (map[Math.floor(ny)] && map[Math.floor(ny)][Math.floor(nx)] == 0) {
                    p.x = nx;
                    p.y = ny;
                }
            }
            if (keys['down'] || keys['s']) {
                let nx = p.x - Math.cos(p.dir) * 0.07,
                    ny = p.y - Math.sin(p.dir) * 0.07;
                if (map[Math.floor(ny)] && map[Math.floor(ny)][Math.floor(nx)] == 0) {
                    p.x = nx;
                    p.y = ny;
                }
            }
            if (keys['fire']) shoot();

            let locked = false;
            enemies.forEach(en => {
                if (!en.alive) return;
                let dx = p.x - en.x,
                    dy = p.y - en.y,
                    d = Math.sqrt(dx * dx + dy * dy);
                let a = Math.atan2(en.y - p.y, en.x - p.x) - p.dir;
                while (a < -Math.PI) a += Math.PI * 2;
                if (Math.abs(a) < 0.08) locked = true;
                if (d < 6) {
                    en.x += (dx / d) * 0.01;
                    en.y += (dy / d) * 0.01;
                    if (d < 0.7) hp -= 0.3;
                }
            });
            pickups.forEach(pk => {
                if (pk.active && Math.sqrt((pk.x - p.x) ** 2 + (pk.y - p.y) ** 2) < 0.8) {
                    pk.active = false;
                    if (pk.type === 'health') hp = Math.min(100, hp + 30);
                    else {
                        ammo = Math.min(300, ammo + 50);
                        document.getElementById('a').innerText = ammo;
                    }
                }
            });
            document.getElementById('crosshair').className = locked ? 'locked' : '';
            document.getElementById('hp-bar').style.width = hp + '%';
            if (hp <= 0) {
                active = false;
                document.getElementById('death-screen').style.display = 'flex';
            }
            if (shake > 0) shake *= 0.8;
        }

        function draw() {
            canvas.width = window.innerWidth / 2;
            canvas.height = window.innerHeight / 2;
            ctx.save();
            ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
            ctx.fillStyle = "#00080d";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const fov = Math.PI / 3;
            for (let i = 0; i < canvas.width; i++) {
                let angle = (p.dir - fov / 2) + (i / canvas.width) * fov;
                let dx = Math.cos(angle),
                    dy = Math.sin(angle),
                    dist = 0,
                    hit = false;
                while (!hit && dist < 20) {
                    dist += 0.1;
                    if (map[Math.floor(p.y + dy * dist)][Math.floor(p.x + dx * dist)] == 1) hit = true;
                }
                dist *= Math.cos(angle - p.dir);
                let h = canvas.height / dist,
                    l = Math.max(0, 200 - dist * 10);
                ctx.strokeStyle = `rgba(0, 242, 255, ${l/255})`;
                ctx.beginPath();
                ctx.moveTo(i, (canvas.height - h) / 2);
                ctx.lineTo(i, (canvas.height + h) / 2);
                ctx.stroke();
            }
            [...enemies, ...pickups].forEach(obj => {
                const isPk = obj.type !== undefined;
                if ((isPk && !obj.active) || (!isPk && !obj.alive)) return;
                let dx = obj.x - p.x,
                    dy = obj.y - p.y,
                    d = Math.sqrt(dx * dx + dy * dy),
                    a = Math.atan2(dy, dx) - p.dir;
                while (a < -Math.PI) a += Math.PI * 2;
                if (Math.abs(a) < fov / 2) {
                    let sx = (a / (fov / 2) * 0.5 + 0.5) * canvas.width,
                        h = canvas.height / d;
                    if (!isPk) {
                        ctx.fillStyle = "#ff3344";
                        ctx.fillRect(sx - h / 4, (canvas.height - h) / 2, h / 2, h);
                    } else {
                        ctx.fillStyle = obj.type === 'health' ? "#00ff88" : "#ffcc00";
                        ctx.fillRect(sx - h / 3, canvas.height / 2 + h / 4, (h / 3) * 2, h / 6);
                    }
                }
            });
            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        generateSector();
        loop();
    </script>
</body>

</html>
